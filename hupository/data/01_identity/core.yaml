  사람들은 능력보다 방향과 구조의 부족 때문에 흔들린다는 문제의식을 키웠다.
  30대 중반 개발 전환과 세종클래스 창업을 통해,
  이제는 그 문제를 교육뿐 아니라 기술과 시스템으로 직접 풀고자 한다.

