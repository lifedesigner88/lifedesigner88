  - trigger: "SW마에스트로 17기 합격 발표 (3/25 오후 2시)"
    if_accepted: >
      내부 합격자 노션에 PR 링크를 가장 먼저 공유.
      4~5월 예비과정 + 클래스101 강의 기획·제작 병행.
      6월 본과정 시작 전 강의 출시 완료 목표.
      소마 팀빌딩에서 알고리즘 강의 채널 보유 강점으로 활용.
      세종클래스는 소마 종료(11월) 이후 재개.
    if_rejected: >
      4~5월 클래스101 강의 제작 + PersonaMirror 독립 서비스 전환 병행.
      PR/AI 데모 링크는 개인 프로젝트 홍보 자산으로 재사용.
      세종클래스 재개 및 수익화 집중.

  - trigger: "클래스101 미팅 결과 (3/27)"
    if_accepted: >
      4~5월 강의 기획·제작 착수. PD 지원 여부 확정.
      합격/불합격 관계없이 5월 말 출시 목표.
    if_rejected: "유튜브 자체 채널로 콘텐츠 전환 검토."

  - trigger: "세종클래스 첫 유료 수강생 발생"
    if_yes: "마케팅 채널 확장, 콘텐츠 증설"
    if_no: "홍보 전략 재검토 (90일 내 미발생 시)"

  - trigger: "서울시 시민참여예산위원 결과"
    if_accepted: "지역 커뮤니티 활동 확장 — 소마와 병행 가능한 수준 유지"
    if_rejected: "은평청년네트워크 집중 유지"
