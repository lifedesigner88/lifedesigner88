      현재 제품의 정체성은 박세종 PR을 보조 신뢰 레이어로 두고,
      팀빌딩에서 `누구와 먼저 대화할지`를 좁히는 문제를 탐색하는 root experience에 더 가깝다.
      단기 목적은 team-fit 데모를 실제로 보여줄 수 있는 구조로 리팩토링해,
      문제 정의, 입력 흐름, 추천 철학, 결과 workspace를 한 번에 이해시키는 것이다.
      장기 목적은 라이프디자인/퍼스널 AI 서비스의 공개 진입점으로 확장하는 것이다.
      3/26 기준 팀 유사도/사람 추천 기능은 당장 붙이지 않고 보류했다.
      예비 3번 상태로 소마 커뮤니티 기능의 즉시성이 약해졌고, 사람 추천은 pgvector/임베딩만으로 해결되지 않으며
      신뢰, 설명 가능성, 대화 후 피드백 구조까지 함께 다뤄야 하는 도메인이라는 판단이 생겼다.
      3/25에는 800명 단체카톡방 운영자와 대화 후 공유 링크의 front door를 박세종 PR 중심으로 급하게 pivot하며 `sejong-pr` 감각이 생겼고,
      3/28에는 독자가 먼저 마주하는 팀빌딩 문제를 전면에 두는 방향으로 `find-team-feat`까지 갔다가,
      이름이 길다고 판단해 같은 날 현재 공개 프로젝트명을 `team-fit`으로 다시 축약했다.
      기존 asm17.huposit.kr 방향은 PR 신뢰 레이어를 유지하되, root의 메인 약속을 팀 빌딩 문제 자체에 더 가깝게 두는 쪽으로 정리됐다.
      3/28 작업 기준 intake는 `문제 한 문장 + MBTI 5축 + SDGs 최대 3개 + 800자 Markdown + AI 후속 질문 3회`의 interview-first flow로 바뀌었고,
      추천 결과는 `최적 팀원 확정`이 아니라 `우선 대화해볼 3명`을 제안하는 conversation-priority 철학으로 재구성됐다.
      저장 상태도 recommendation 결과, fit-score feedback, broader candidate directory, lighter transcript UI를 포함한 editable workspace로 옮겨갔다.
      repo 브랜딩, 문서, demo seed data, runtime behavior도 이 방향에 맞춰 함께 정리되었다.
      3/29 작업 기준으로는 첫 `팀핏 탐색` demo의 root `/` 흐름을 예전 creator-PR 설명보다 team-fit exploration 중심으로 더 조였고,
      가입 → 검증 → 프로필 작성 → AI 후속 질문 → 추천 검토 → 계정 관리까지 이어지는 end-to-end 동선이 한 번에 보이도록 다듬었다.
      또한 roadmap은 chronological pivots와 code-reading hierarchy를 함께 보여주는 학습용 지도로 다시 작성했고,
      top-level README는 현재 repo를 larger `귀인` 프로젝트 안의 team-building demo이자 `10일 바이브코딩 첫 데모`로 압축해 소개하는 방향으로 정리했다.
      다음 단계는 예비합격 공개용 최소 리팩토링 후, team-fit을 해부하며 Python/FastAPI/Nx/Docker/배포 구조와
      사람-사람 매칭/팀핏/코칭 도메인을 함께 학습하는 것이다.

# ─────────────────────────────────────────
# 현재 제약 조건
# ─────────────────────────────────────────
constraints:
  financial_runway_months: null   # 업데이트 필요
  primary_constraint: "수익 창출 시급 (세종클래스 첫 매출)"
  simultaneous_focus_capacity: 2  # 지금 동시에 진지하게 집중 가능한 트랙 수
  energy_level: null              # low | medium | high — 업데이트 필요
  location: "Seoul"
  work_mode: "solo"

# ─────────────────────────────────────────
# 현재 집중 우선순위 (1 = 가장 중요)
# ─────────────────────────────────────────
focus_priority:
  1: "sw_maestro_17 — 예비 3번 대기 + 즉시 대응 준비"
  2: "sejongclass — 주차별 유튜브 업로드 리듬 + `휴포지토리 사용법` 콘텐츠"
  3: "ai_agent_dev — team-fit 독립 공유용 카피·링크 패키지 정리"
  4: "class101_opportunity — 낮은 기대치 후속 대기"

# ─────────────────────────────────────────
# 대기 중인 외부 이벤트 (결과에 따라 전략 분기)
# ─────────────────────────────────────────
pending_decisions:
  - trigger: "SW마에스트로 17기 추가합격 연락 여부 (1차 등록 마감 3/30 이후)"
    if_called: >
      즉시 등록 및 팀빌딩/네트워킹 준비.
      `귀인` 노션 링크와 팀원 모집 문안을 바로 공유.
      4~5월 예비과정 + 클래스101 강의 기획·제작 병행.
      6월 본과정 시작 전 강의 출시 완료 목표.
      소마 팀빌딩에서 알고리즘 강의 채널 보유 강점으로 활용.
    if_not_called: >
      이번 주는 예비 대기 상태를 유지하되,
      4~5월 클래스101 강의 제작 + team-fit 독립 서비스 전환을 계속 진행.
      PR/AI 데모 링크는 개인 프로젝트 홍보 자산으로 재사용.
      세종클래스 수익화는 병행 우선순위로 유지.

  - trigger: "클래스101 1차 커리큘럼 초안 전달 및 기획 미팅 연결"
    if_accepted: >
      4~5월 강의 기획·제작 착수. PD 지원 여부와 실제 제작 일정 단축 가능 범위 확정.
      합격/불합격 관계없이 5월 말 출시 가능성 재산정.
    if_rejected: "클래스101은 보류하고 유튜브·세종클래스 채널에서 기존 자산화 흐름 유지."

  - trigger: "세종클래스 첫 유료 수강생 발생"
    if_yes: "마케팅 채널 확장, 콘텐츠 증설"
    if_no: "홍보 전략 재검토 (90일 내 미발생 시)"

  - trigger: "서울시 시민참여예산위원 결과"
    if_accepted: "지역 커뮤니티 활동 확장 — 소마와 병행 가능한 수준 유지"
    if_rejected: "은평청년네트워크 집중 유지"
