      현재 첫 제품 방향은 실제 오프라인 만남과 녹음 데이터를 바탕으로
      self / pair / 3~4인 group report를 누적하는 `RRS 기반 관계 리포팅 플랫폼`으로 좁혀졌다.
      가능한 모든 조합을 계산하는 것이 아니라 실제 발생한 encounter만 관계 자산으로 남기며,
      큰 방향은 팀 합의가 됐고, 핵심 계약은 encounter, relation key, report schema, consent/unlock 구조를 중심으로 차차 구체화해간다.
      현재 최우선 과제는 4~5월 동안 약 130명의 멘토 후보 중,
      2026-06~11 6개월 동안 팀을 이끌 담당 멘토 3명을 매칭하는 일이다.
      각 멘토는 약 100개 팀 중 최대 2개 팀만 맡을 수 있어 빠르게 접근해야 하며,
      팀은 프로필/단체 사진과 팀 소개 PPT를 활용해 문제의식과 실행력을 함께 어필하는 전략을 쓰고 있다.
      제품 측면의 즉시 과제는 멘토 미팅과 병행해 relation contract와 6주 MVP 마일스톤을 차례로 선명하게 만드는 것이다.

