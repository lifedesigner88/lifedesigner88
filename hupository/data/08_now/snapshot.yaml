    notes: >
      4/12 팀원 1명 이탈 이후 2인 체제로 재정렬하는 과정에서,
      기존 relation reporting 방향보다 사용자의 교육 도메인 신뢰 자산을 더 직접 활용할 수 있는 제품으로 좁히는 작업이 진행됐다.
      4/18 기준 1차 기획 확정본은 `초·중 생활기록부 기반 예비 고1 AI 대입컨설팅 서비스`였고,
      2026-04-26에는 이를 `찐로(JJinro)`라는 데이터 기반 고교 진학 및 자생적 진로 성장 내비게이션으로 정리했다.
      핵심 흐름은 생기부 업로드, AI 추가질문 기반 결측 보강, 10단계 진로 플로우 기반 초기 리포트,
      대학생 멘토 1회 무료 상담, 8개월 마스터플랜, 월 구독형 SaaS 전환까지 이어지는 구조다.
      2026-04-18 교육업계 전 직장 네트워크와의 통화에서는
      수학·물리 같은 과목 수업 선생님 추천 형태의 학생 연결 가능성은 확인됐지만,
      대형 교육기업과의 직접 법인 제휴는 현재 팀 규모와 속도 기준으로는 너무 무겁고,
      소마 기간 안에 실제로 성사시키기에는 사실상 어렵다는 판단이 나왔다.
      추가로 대형 교육기업은 마케팅으로 고객 유입은 만들 수 있어도,
      실제로 그 수요를 소화할 좋은 선생님 공급이 부족한 경우가 많고,
      외부 추천 구조는 우수 선생님 유출 리스크로 읽힐 수 있어 협업 유인이 약하다는 신호도 확인됐다.
      2026-04-19에는 서로 다른 가족 배경과 진로 상황을 가진 학부모·학생 네트워크,
      그리고 학교 교육 현장 접점과의 대화를 통해 초기 고객조사 후보군과 채널 후보군이 동시에 열리기 시작했다.
      이 신호는 곧바로 제품 범위를 넓히라는 뜻보다,
      부모가 실제로 원하는 것은 아이의 현재 상태와 가능성을 함께 해석해 현실적인 다음 선택을 돕는 구조라는 점,
      그리고 지금 단계에서는 기능 추가보다 고객이 원하는 첫 output과 후속 연결을 먼저 듣는 discovery가 더 중요하다는 점을 강화했다.
      2026-04-20~2026-04-22에는 한 중3 학생 가족 사례가 구체 problem interview / pilot candidate 단계로 내려오며,
      익명화된 생활기록부 샘플 발송, 사전 질문 리스트 준비, 방문 상담 일정 조율까지 진행됐다.
      이는 고객조사가 추상적 네트워크 탐색에서 실제 first consultation 설계 단계로 이동하기 시작했다는 신호다.
      또한 2026-04-21부터는 생활기록부 input 구조를 실제 데이터 엔지니어링 문제로 다루기 시작했고,
      노션 권한 이슈 이후 일정 운영은 구글캘린더 중심으로 전환하며 Linear / LLM 자동화 실험을 병행하고 있다.
      다만 운영 자동화는 4/29 MVP보다 앞세우지 않고 보조 축으로만 둔다.
      2026-04-22에는 최근 팀빌딩 branch였던 신규 팀원 후보 1명이
      점심, 커피 대화, 약 2시간 인수인계, 다음날 팀 사진촬영용 옷 구매까지 이어가며
      합류 의사를 행동으로 확정했다.
      따라서 현재 팀빌딩의 핵심 질문은 `합류 여부`에서 `3인 체제의 역할 경계와 온보딩 안정화`로 옮겨간다.
      2026-04-26에는 신규 팀원의 상세 프로필을 반영하면서,
      해당 팀원이 실사용자 커뮤니티 앱의 인증/인가/사용자 생명주기 설계,
      이벤트형 서비스의 AWS 인프라/트래픽 운영,
      그리고 AI 기반 설계 문서 자동화 경험을 가진 backend/PM 성향 팀원이라는 점이 더 분명해졌다.
      같은 날 엑스퍼트 배정 구조도 정리되며,
      월 1회 필수 멘토링을 팀 운영, BM, MVP 범위, 기획심의, seed 투자 준비를 점검하는 보조 리듬으로 활용할 수 있게 됐다.
      2026-04-24에는 외부 지인/조언자 앞에서 3인 팀의 첫 프로젝트 피칭을 진행하며
      팀원들의 서비스 이해도를 맞췄고,
      저녁에는 담당멘토와의 멘토링에서 신규 팀원 소개, 다음날 6자 대면 인터뷰 준비,
      밸류 프로포지션 디자인 실습을 진행했다.
      2026-04-25에는 중3 학생 가족과의 첫 대면 고객 인터뷰에서
      팀이 프로젝트를 직접 피칭하고, 학생과 보호자의 이야기를 들었으며,
      학생의 참여 의사와 중간고사 이후 컨설팅 시작 가능성을 확인했다.
      이 신호는 초기 고객조사가 실제 파일럿 후보와 연결되기 시작했다는 의미가 있으며,
      팀원들이 고객의 실제 필요를 직접 마주하면서 제품 동기와 서비스 이해도도 강화됐다.
      2026-04-26에는 오전 11시 첫 엑스퍼트 미팅을 진행했고,
      별도 멘토와 약 2시간 멘토링을 진행한 뒤 담당멘토로 확정해
      목표한 담당멘토 3자리 중 2자리를 확보했다.
      기존 후보 2명은 팀을 선택하지 않았지만,
      역으로 제안해준 멘토 후보 2명과 추가로 만나본 뒤 남은 1자리를 결정할 가능성이 생겼다.
      다음 단계는 멘토 미팅과 병행해 4/29 14:00에 배포할 최소 MVP 범위를
      `생기부 분석 -> AI 인터뷰 -> 진로 내비게이션 초안 -> 무료 상담 연결` 수준으로 다시 최소화하되,
      첫 pilot candidate에게 약속할 output과 운영 범위를 과도하게 넓히지 않는 것이고,
      frontend / final PM ownership / domain validation / consultant partnership 공백을 어떤 방식으로 메울지 정리하는 것이다.
      장기적으로는 2026년 소마 공식 일정에 맞춰 5월 기획심의, 8월 중간점검, 11월 최종점검, 12월 데모데이를
      투자 준비의 계단으로 사용해 수료 시점 전후 3억 규모 seed 투자 검토가 가능한 상태를 만드는 것이 현재 기준 연간 목표다.

