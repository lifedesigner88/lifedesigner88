# 현재 유효한 의사결정 — data/08_now/decisions.yaml
# AI가 현시점 맥락을 빠르게 파악하고 다음 행동을 논의할 때 읽는 live decision 레이어.
# 결과가 끝났거나 다른 결정에 의해 대체된 항목은 ../09_history/decisions/ 로 이동한다.

as_of: "2026-04-18"
archive_ref:
  decisions: "../09_history/decisions/2026-04.yaml"
selection_rule:
  keep_here: "오늘/이번 달 판단을 직접 바꾸는 live decision만 남긴다."
  move_to_history: "결과가 종료됐거나, 현재 전략을 더는 직접 바꾸지 않는 결정은 09_history로 옮긴다."

decisions:

  - id: "D009"
    date: "2026-03-27"
    decision: "장기 사명의 핵심 문제의식을 `삶과 성장을 설계할 구조의 부족`으로 명료화"
    rationale: >
      최근 대화와 정본 데이터 재독을 통해 반복되는 패턴이
      단순한 정보 전달이나 자기계발이 아니라,
      방향을 잃은 사람·늦게 출발한 사람·흩어진 가능성을 가진 사람들이
      삶과 성장을 설계할 구조를 갖지 못해 흔들리는 문제를 푸는 데 있다는 점이 확인됐다.
      앞으로의 프로젝트와 선택은 이 문제의식에 얼마나 직접 연결되는지를 기준으로 본다.
    alternatives_rejected:
      - option: "교육, 개발, 커뮤니티, 코칭을 각각 별개의 관심사로 해석"
        why_rejected: "실제 데이터에서는 모두 동일한 문제의식의 다른 표현으로 반복됨"
    outcome: "success"
    outcome_note: "2026-03-27 대화에서 사용자 본인이 이 해석에 강하게 공감했고, identity/lifetime/tree 문구에 함께 반영했다."

  - id: "D011"
    date: "2026-03-27"
    decision: "내 사업에서는 제안/섭외 단계부터 기본 응답성과 맥락 존중을 지키는 운영 원칙을 둔다"
    rationale: >
      클래스101 접점에서 정성 있는 의견과 피드백을 요청한 뒤에도
      후속 응답과 맥락 설명이 충분히 돌아오지 않는 경험을 하면서,
      내가 직접 사업을 한다면 사람을 파이프라인의 한 건처럼 다루지 않겠다는 기준이 선명해졌다.
      앞으로는 초기 접점일수록 `왜 연락했는지`, `지금 어떤 단계인지`, `다음은 무엇인지`를 분명히 전하는 태도를 지향한다.
    alternatives_rejected:
      - option: "효율을 위해 초기 접점에서는 응답성과 맥락 설명을 최소화"
        why_rejected: "단기 처리량은 높아질 수 있어도 신뢰와 브랜드를 장기적으로 갉아먹을 가능성이 큼"
      - option: "좋은 의도가 있으면 소통 부족은 감수"
        why_rejected: "의도와 별개로 상대는 실제 응답성과 존중의 수준을 경험하게 됨"
    outcome: "success"
    outcome_note: "내가 만들 사업의 운영 태도를 정하는 기준으로 계속 유지한다."

  - id: "D012"
    date: "2026-03-27"
    decision: "앞으로 팀을 이끌 때는 팀원의 정성과 맥락을 존중하는 운영 태도를 핵심 기준으로 둔다"
    rationale: >
      클래스101 접점에서 존중과 응답성이 부족하다고 느낀 경험을 돌아보며,
      소마 팀을 포함한 앞으로의 협업에서는 이렇게 하지 않겠다는 기준이 분명해졌다.
      팀 운영에서는 실력과 역할 배치도 중요하지만,
      먼저 기대를 주거나 의견을 요청한 뒤에는 짧더라도 응답하고,
      다음 단계와 판단 기준을 숨기지 않는 태도가 신뢰를 만든다고 본다.
    alternatives_rejected:
      - option: "팀 운영에서는 효율을 위해 감정과 맥락보다 역할 수행만 본다"
        why_rejected: "단기 조율은 편할 수 있어도 장기적으로 신뢰와 협업 밀도를 약하게 만들 가능성이 큼"
      - option: "좋은 팀은 실력만 충분하면 존중 방식은 크게 중요하지 않다"
        why_rejected: "실제 경험상 존중과 응답성은 같이 일하고 싶은 마음과 몰입도에 직접 영향을 줌"
    outcome: "success"
    outcome_note: "소마 팀 운영과 앞으로의 협업 기준으로 계속 유지한다."

  - id: "D021"
    date: "2026-04-10"
    decision: "클래스101 경로는 당분간 진행하지 않고, SW마에스트로 팀 프로젝트와 멘토 3인 매칭에 집중한다"
    rationale: >
      현재 시점의 가장 큰 레버리지는 클래스101 강의 제작보다
      SW마에스트로 팀 프로젝트의 방향 고정, 멘토 3인 매칭, 첫 MVP 구체화에 있다.
      클래스101은 이미 후속 응답성과 신뢰도 측면에서 약한 신호가 있었고,
      지금 병행하면 집중 용량이 분산될 가능성이 크다.
      따라서 당분간은 클래스101 제작을 멈추고,
      소마 본과정과 팀 제품을 밀어 올리는 데 집중하는 편이 현재 우선순위와 더 맞다.
    alternatives_rejected:
      - option: "클래스101 제작을 4~5월에 병행한다"
        why_rejected: "지금은 소마 팀 프로젝트와 멘토 매칭이 더 직접적인 레버리지이며, 병행 시 집중력이 분산될 수 있다"
      - option: "클래스101을 여전히 조건부 채널 후보로 적극 열어둔다"
        why_rejected: "현재는 재검토보다 명시적 비집중이 더 선명한 운영 판단이다"
    outcome: "success"
    outcome_note: "2026-04-10 기준 클래스101은 진행하지 않고, 당분간 SW마에스트로 팀 프로젝트와 멘토링에 집중한다."

  - id: "D022"
    date: "2026-04-10"
    decision: "당분간 세종클래스 첫 매출 압박보다, 2026-11 말 SW마에스트로 수료 시점에 3억 규모 seed 투자를 받을 수 있는 팀/제품 진척을 더 중요한 제약으로 둔다"
    rationale: >
      현재 시점에는 세종클래스 첫 매출보다
      SW마에스트로 팀 프로젝트를 투자 가능한 수준의 문제 정의, 팀, 멘토 네트워크, MVP 진척으로 밀어 올리는 쪽이
      더 큰 레버리지로 판단된다.
      수료 시점인 2026-11 말은 외부 설명과 팀 스토리, 제품 진척을 한 번에 증명해야 하는 분기점이므로,
      지금부터의 우선순위도 그 기준에 맞춰야 한다.
      따라서 세종클래스 수익 압박은 당분간 1순위 제약에서 잠시 내려두고,
      멘토 3인 매칭, MVP 계약 고정, 투자 가능한 팀 설명을 더 앞에 둔다.
    alternatives_rejected:
      - option: "세종클래스 첫 매출 압박을 계속 최상위 제약으로 둔다"
        why_rejected: "현재는 SW마에스트로 팀 프로젝트가 더 큰 중장기 레버리지이며, 제약 우선순위도 그쪽에 맞추는 편이 낫다"
      - option: "수익과 seed 투자를 같은 비중으로 병행 관리한다"
        why_rejected: "동시 집중 용량이 2인 상황에서 현재는 seed 투자 가능성을 만드는 경로에 더 명확히 무게를 둘 필요가 있다"
    outcome: "pending"
    outcome_note: "2026-04-10 기준 현재 제약의 중심은 `세종클래스 첫 매출`보다 `11월 말 seed 투자 가능 수준 도달`이다."

  - id: "D024"
    date: "2026-04-13"
    decision: "2인 체제 전환 이후 팀 상황을 투명하게 공개하고, 2026-05-10까지 애자일 팀빌딩으로 새 팀원 또는 팀 재구성을 병행 탐색한다"
    rationale: >
      2026-04-12 팀원 이탈 이후 남은 두 사람은
      `교육 기술을 통한 자기이해 지원`과
      `오프라인 대화 데이터 기반 AI 분석 리포트`라는 문제의식에 계속 공감하고 있다.
      반면 이탈한 팀원이 선호한 방향은 수익 모델이 더 직접적인 별도 IP 비즈니스였고,
      이 차이는 개인 감정보다 비즈니스 fit 차이에 가까웠다.
      따라서 지금 필요한 것은 빈자리를 서둘러 채우는 것보다,
      현재 팀이 무엇을 믿고 어떤 방식으로 검증하려 하는지 투명하게 공개한 뒤
      그 문화와 문제의식에 실제로 공감하는 사람을 찾는 것이다.
      공개 모집과 함께 2026-04-14부터는 이미 팀이 있는 연수생에게도
      노션 소개 페이지를 바탕으로 직접 제안하고,
      1주일 trial처럼 빠르게 함께 일해보며 fit을 확인하는 편이 현재 상황에 더 맞다.
    alternatives_rejected:
      - option: "팀 분리 사실을 최소한으로만 알리고 조용히 새 팀원을 찾는다"
        why_rejected: "현재 상황과 기준을 숨기면 같은 불일치를 다시 반복할 가능성이 커진다"
      - option: "역할만 맞으면 우선 합류시키고 이후에 문화와 방향을 맞춘다"
        why_rejected: "지금은 구현 스킬보다 문제의식, 수익화 해석, 팀 운영 방식의 fit이 더 중요하다"
      - option: "당분간 완전 2인 체제로만 가고 팀 재구성 탐색은 미룬다"
        why_rejected: "product / frontend / PM / outreach 공백이 실제로 존재하므로 병행 탐색이 더 현실적이다"
    outcome: "pending"
    outcome_note: >
      현재 기준 운영 방식은
      300명 규모 연수생/멘토/엑스퍼트/사무국 앞에 상황과 문화를 투명하게 공유하고,
      2026-04-14부터 직접 제안을 병행하며,
      2026-05-10까지 애자일하게 fit을 검증하는 것이다.
      다만 2026-04-15 기준 초기 직접 제안은 모두 거절되어,
      다음 모집은 막연한 충원보다 제품 방향과 필요한 역할을 더 선명하게 고정한 뒤 다시 여는 쪽으로 보정됐다.

  - id: "D025"
    date: "2026-04-14"
    decision: "service/BM/completion fit이 강한 멘토 후보 1명을 현재 팀의 담당멘토 1순위로 확정하고, 문제정의·서비스기획·BM·완주 역량을 보강하는 축으로 삼는다"
    rationale: >
      2026-04-14 멘토링에서 해당 멘토 후보는
      `누가 왜 불편한가`, `왜 이 기술이어야 하는가`, `빠른 MVP 배포와 검증`,
      `프로젝트를 끝까지 이끄는 팀`이라는 프레임을 분명히 제시했다.
      이는 현재 2인 체제로 재정렬 중인 팀이 가장 부족하게 느끼는
      product / service planning / BM / completion 관점과 직접 맞닿아 있다.
      사내 지식관리 서비스 경험의 다른 멘토도 훌륭한 접점이었지만,
      창업집중형 팀이 지금 당장 원하는 도움의 성격은 이 멘토 후보 쪽이 더 직접적이라고 봤다.
    alternatives_rejected:
      - option: "좋은 인상과 네트워크 폭을 이유로 사내 지식관리 배경 멘토를 우선한다"
        why_rejected: "대화의 질은 높았지만, 현재 팀의 창업집중형 문제정의·BM·완주 관점을 가장 직접적으로 보강해주지는 않았다"
      - option: "멘토 선택을 더 미루고 계속 넓게만 탐색한다"
        why_rejected: "4월 안에 3인 조합을 좁혀야 하는 압박이 있으므로, 강한 fit이 보인 후보는 먼저 잠그는 편이 낫다"
    outcome: "pending"
    outcome_note: >
      2026-04-14 미팅 뒤 내부 기준으로는 담당멘토 1순위로 확정했다.
      공식 최종 조합은 4월 안에 나머지 멘토 우선순위와 함께 닫아야 한다.

  - id: "D026"
    date: "2026-04-15"
    decision: "초기 직접 제안이 모두 거절된 뒤에는, 5/10까지의 팀빌딩을 급하게 밀기보다 MVP 방향과 필요한 팀 역할을 먼저 명확히 한 뒤 역할기반 모집으로 전환한다"
    rationale: >
      현재까지 사용자가 직접 제안했던 후보들이 모두 거절하면서,
      `좋은 사람을 먼저 모아보자`는 방식만으로는 실제 합류를 만들기 어렵다는 신호가 확인됐다.
      지금 공백은 단순 개발자 1명이 아니라 product / frontend / PM / mentor outreach 축에 더 가깝고,
      이 역할을 어떤 제품 방향과 왜 연결하는지 선명하지 않으면 모집 설득력이 약해질 수 있다.
      또한 2026-05-10까지는 아직 시간이 남아 있으므로,
      조급하게 아무나 채우기보다 2인 기준 MVP 계약과 필요한 자리의 정의를 먼저 고정하는 편이 더 낫다.
    alternatives_rejected:
      - option: "현재 설명 수준 그대로 직접 제안을 더 많이 보내본다"
        why_rejected: "현재도 이미 거절이 반복됐고, 역할과 방향이 흐린 상태에서는 설득력이 더 떨어질 수 있다"
      - option: "팀빌딩 탐색을 당분간 완전히 멈추고 2인 체제로만 간다"
        why_rejected: "공백 역할이 실제로 존재하므로 탐색은 유지하되, 기준을 더 정교하게 바꾸는 편이 현실적이다"
    outcome: "pending"
    outcome_note: >
      2026-04-15 기준 다음 팀빌딩의 전제는
      `우리가 지금 정확히 어떤 제품을 왜 만들고 있고, 어떤 자리를 왜 채우려 하는가`를 한 장으로 설명할 수 있게 되는 것이다.

  - id: "D027"
    date: "2026-04-18"
    decision: "Hupository/Team 310의 1차 기획 확정본은 `초·중 생활기록부 기반 예비 고1 AI 대입컨설팅 서비스`로 둔다"
    rationale: >
      오늘 대화와 정리 과정에서,
      기존 relation reporting이나 부모 선행형 Retro-Hupository 구조보다
      사용자의 교육 도메인 신뢰 자산과 실제 고객 문제를 더 직접적으로 연결하는 제품이 필요하다는 판단이 선명해졌다.
      예비 고1 학부모는 이미 초등 6년과 중학교 누적 기록을 가지고 있지만,
      이를 입시 방향과 고교 진학 준비라는 관점에서 읽어주는 구조가 부족하다.
      따라서 첫 제품은 `초·중 누적 데이터를 읽고, 부족한 정보를 AI 질문으로 보강한 뒤,
      무료 초기 리포트와 전문 컨설턴트 연결까지 이어지는 AI 대입컨설팅 서비스`로 좁히는 편이 맞다.
    alternatives_rejected:
      - option: "RRS 기반 오프라인 관계 리포팅 플랫폼을 그대로 유지"
        why_rejected: "현재 팀/창업자 신뢰 자산과 즉시 검증 가능한 고객 문제 사이의 거리가 더 컸다"
      - option: "부모 자기기록 복기를 앞단에 두는 Retro-Hupository 구조를 첫 제품으로 밀기"
        why_rejected: "흥미로운 진입 아이디어였지만, 1차 MVP의 문제정의와 수익 구조를 더 넓히는 효과가 있었다"
      - option: "초6~중2 전체를 포괄하는 넓은 성장 데이터 플랫폼 설명을 유지"
        why_rejected: "첫 wedge로는 고객과 가치 약속이 아직 넓었고, 예비 고1 전환기가 더 선명했다"
    outcome: "pending"
    outcome_note: >
      2026-04-18 기준 현재 live decision이다.
      다음 단계는 이 1차 기획 확정본을 멘토 피드백, MVP 계약, 초기 파일럿 설계 수준으로 더 구체화하는 것이다.
