# 주요 의사결정 로그 — data/08_now/decisions.yaml
# AI가 "왜 이 방향인가"를 이해하기 위한 맥락 데이터.
# 결정을 내릴 때마다 추가. 결과가 나오면 outcome 업데이트.

decisions:

  - id: "D001"
    date: "2025-07"
    decision: "엔코아(PlayData) 퇴사 → 세종클래스 1인 창업 전념"
    rationale: >
      교육×기술 통합이 장기 방향이고, 지금 만들지 않으면 언제 만드나.
      취업은 창업 실패 후에도 할 수 있는 옵션.
    alternatives_rejected:
      - option: "취업 먼저 (백엔드/풀스택 개발자)"
        why_rejected: "창업 시도 없이 취업하면 나중에 후회할 것 같았음"
      - option: "부업으로 병행"
        why_rejected: "에너지 분산으로 어중간한 결과가 날 것"
    outcome: "pending"  # pending | success | failure | pivot
    outcome_note: null

  - id: "D002"
    date: "2025-10"
    decision: "세종클래스 스택 선택 — Supabase + React Router + Vercel"
    rationale: >
      1인 운영이므로 관리 포인트 최소화. BaaS로 인프라 부담 줄이고
      TypeScript + React 스킬을 그대로 활용.
    alternatives_rejected:
      - option: "Spring Boot + 자체 DB 서버"
        why_rejected: "1인 운영에 오버엔지니어링. 데브옵스 비용 과다."
    outcome: "success"
    outcome_note: "플랫폼 기술적으로 완성. 운영 중."

  - id: "D003"
    date: "2026-03"
    decision: "SW마에스트로 17기 도전"
    rationale: >
      AI 역량 고도화와 네트워크 확보를 위한 최선의 기회.
      합격 시 세종클래스 최소 유지 모드로 전환.
    alternatives_rejected: []
    outcome: "pending"
    outcome_note: "3/25 최종 결과 예비 3번(303등). 3/30 1차 서류 등록 마감 이후 추가합격 연락 가능성 대기 중."

  - id: "D004"
    date: "2026-02"
    decision: "소마 코딩테스트 대비 — 30일 300문제 자체 제작 후 유튜브 공개"
    rationale: >
      AI(Gemini, GPT 기반 도구들)로 모의고사를 직접 출제하면
      학습 효과와 콘텐츠 자산을 동시에 얻을 수 있다는 판단.
      공개하면 소마 지원자 네트워크도 생긴다.
    alternatives_rejected:
      - option: "기존 문제집/강의로 준비"
        why_rejected: "수동적 학습. 콘텐츠 자산이 남지 않음."
    outcome: "success"
    outcome_note: >
      플래티넘 5 달성, 코딩테스트 합격(3/11).
      유튜브 영상이 소마 지원자 유입 → 클래스101 강의 제작 제안(3/27 미팅)으로 이어짐.

  - id: "D005"
    date: "2026-03"
    decision: "클래스101 소마 코딩테스트 강의 제작 제안 — 미팅 수락"
    rationale: >
      세종클래스 외 독립적인 수익 채널. 이미 만든 300문제 콘텐츠를 활용 가능.
      클래스101 플랫폼 유입으로 세종클래스 인지도 상승 가능성.
    alternatives_rejected: []
    outcome: "pending"   # 3/27 미팅 후 수락/거절 결정
    outcome_note: >
      3/27 1차 오픈 미팅 27분 진행.
      제작 기간 단축 가능성과 수익 발생 시점 조율 가능하다는 답변을 받음.
      오늘 만난 담당자는 일정 조율 중심의 코디 역할에 가까웠고,
      첫 미팅에서 말한 `내일 오전 10시`는 주말 다음 영업일인 3/30(월) 오전 10시로 해석하는 편이 맞다.
      1:1 카카오톡방 링크 수신 후 1차 커리큘럼 초안을 전달하면
      기획 미팅 담당자와의 후속 미팅으로 연결될 가능성이 높다.

  - id: "D006"
    date: "2026-03-23"
    decision: "PersonaMirror를 소마·클래스101과 별개로 지속할 핵심 과업으로 유지"
    rationale: >
      Hupository 데이터를 실제 유즈케이스로 보여주는 첫 번째 제품이며,
      소마 합격 여부와 관계없이 장기 사명(G-LIFE)을 구현하는 가장 직접적인 실험체이기 때문.
      외부 기회는 가속 수단일 뿐, PersonaMirror 자체는 계속 밀어야 할 축으로 판단.
    alternatives_rejected:
      - option: "소마 합격 시에만 팀 매칭 도구로 한정"
        why_rejected: "외부 결과에 종속되면 장기 방향성이 약해짐"
      - option: "소마 불합격 시 프로젝트 중단"
        why_rejected: "이미 확보한 데모와 방향성을 버리기엔 장기 가치가 큼"
    outcome: "pending"
    outcome_note: "3/25 결과가 예비 3번(303등)으로 확인돼, 외부 결과와 무관하게 PersonaMirror를 계속 밀어야 한다는 판단이 더 강화됨."

  - id: "D007"
    date: "2026-03-25"
    decision: "소마 합격 직후 공유되는 첫 링크의 front door는 ASM 17 Community보다 박세종 Creator PR을 우선"
    rationale: >
      300명 규모의 합격자 자기소개 노션에서는 긴 기능 설명보다
      박세종이 어떤 사람이고 왜 같이 팀하면 좋은지, 그리고 실제로 바로 만들 수 있는 사람인지가
      몇 초 안에 보여야 한다는 판단.
      내부 정보공유 노션이 이미 강하게 열릴 가능성이 높아 공용 정보공유 시스템 자체보다
      유튜브·AI 데모·서비스 링크를 통한 PR/실행력 증명이 더 중요한 차별점이 된다.
    alternatives_rejected:
      - option: "ASM 17 Community 브랜딩과 대시보드 흐름을 루트 front door로 계속 유지"
        why_rejected: "커뮤니티 도구는 보이지만 박세종이라는 사람과 팀 핏이 먼저 기억되기 어렵다"
      - option: "장기 비전 설명을 길게 앞세우기"
        why_rejected: "300명 노션 환경에서는 추상 비전보다 짧은 카피와 이미 만든 증거가 더 잘 읽힌다"
    outcome: "pending"
    outcome_note: "3/25 결과가 예비 3번(303등)으로 나와 합격자 전용 즉시 공유는 보류됐지만, Creator PR front door 전략은 waitlist 대기/독립 PR 자산으로 계속 유지."

  - id: "D008"
    date: "2026-03-26"
    decision: "PersonaMirror의 팀 유사도/사람 추천 기능은 보류하고, 예비합격 공개용 최소 리팩토링 후 프로젝트 해부·도메인 학습을 먼저 진행"
    rationale: >
      예비 3번 상태가 되면서 원래 상정했던 소마 커뮤니티 기능의 즉시성이 약해졌다.
      또한 사람 추천은 pgvector나 임베딩 거리 계산만 익히면 되는 문제가 아니라,
      사람이 왜 잘 맞는다고 느끼는지, 추천 근거를 어떻게 설명할지,
      대화 후 피드백을 어떻게 다시 학습 루프로 넣을지까지 함께 다뤄야 하는 도메인이라는 판단이 생겼다.
      현재 상태에서 계속 바이브코딩만으로 밀면 추천 이유를 설명하지 못한 채 기능만 붙이는 위험이 크다고 봤다.
    alternatives_rejected:
      - option: "pgvector 기반 사람 추천 MVP를 바로 개발"
        why_rejected: "추천 근거와 신뢰성을 설명하지 못한 채 기능만 늘어날 가능성이 큼"
      - option: "소마 커뮤니티 기능을 계속 확장"
        why_rejected: "예비 3번 상태에서는 당장 사용할 커뮤니티 맥락과 긴급성이 약해짐"
    outcome: "pending"
    outcome_note: "당분간은 Creator PR 데모를 공개 가능한 수준으로 정리하고, 이후 PersonaMirror 해부와 사람-사람 매칭/팀핏/코칭 도메인 학습을 진행한다. 3/26 작업 기준 Team-fit Explorer 자체는 PR-first shell 안의 stable v1 demo surface까지 정리되었지만, 추천 고도화는 계속 보류한다."

  - id: "D009"
    date: "2026-03-27"
    decision: "장기 사명의 핵심 문제의식을 `삶과 성장을 설계할 구조의 부족`으로 명료화"
    rationale: >
      최근 대화와 정본 데이터 재독을 통해 반복되는 패턴이
      단순한 정보 전달이나 자기계발이 아니라,
      방향을 잃은 사람·늦게 출발한 사람·흩어진 가능성을 가진 사람들이
      삶과 성장을 설계할 구조를 갖지 못해 흔들리는 문제를 푸는 데 있다는 점이 확인됐다.
      앞으로의 프로젝트와 선택은 이 문제의식에 얼마나 직접 연결되는지를 기준으로 본다.
    alternatives_rejected:
      - option: "교육, 개발, 커뮤니티, 코칭을 각각 별개의 관심사로 해석"
        why_rejected: "실제 데이터에서는 모두 동일한 문제의식의 다른 표현으로 반복됨"
    outcome: "success"
    outcome_note: "2026-03-27 대화에서 사용자 본인이 이 해석에 강하게 공감했고, identity/lifetime/tree 문구에 함께 반영했다."

  - id: "D010"
    date: "2026-03-27"
    decision: "클래스101은 비전 파트너보다 조건부 유통 채널 후보로 낮은 기대치로 대한다"
    rationale: >
      3/27 클래스101 접점에서 처음에는 가능성을 보고 먼저 손을 내민 듯한 신호가 있었지만,
      정성스럽게 보낸 메일과 커리큘럼 의견에 대한 후속 응답성은 기대보다 약하게 느껴졌다.
      큰 조직의 분업 프로세스에서 맥락이 희미해졌을 가능성은 있어도,
      현재 접점의 신뢰도가 낮다는 감각 자체는 유효한 신호로 보는 편이 맞다고 판단했다.
      따라서 클래스101은 당분간 함께 비전을 만드는 파트너로 과대해석하지 않고,
      존중과 응답성이 확인될 때만 활용 가능한 유통 채널 후보로 대하는 쪽이
      내 시간, 에너지, 브랜드 가치를 지키는 데 더 적절하다고 본다.
    alternatives_rejected:
      - option: "클래스101을 장기 비전 파트너로 받아들이고 적극 제작 착수"
        why_rejected: "현재 접점의 응답성과 신뢰도가 그 기대를 지지하지 못함"
      - option: "즉시 완전 종료"
        why_rejected: "향후 존중해주는 MD나 기획 담당자와 연결될 가능성은 아직 남아 있음"
    outcome: "pending"
    outcome_note: >
      문은 닫지 않되 기대와 투자 수준은 낮게 둔다.
      실제 의사결정자 연결, 응답성, 포지셔닝 존중이 확인될 때만 다음 단계로 간다.

  - id: "D011"
    date: "2026-03-27"
    decision: "내 사업에서는 제안/섭외 단계부터 기본 응답성과 맥락 존중을 지키는 운영 원칙을 둔다"
    rationale: >
      클래스101 접점에서 먼저 가능성을 언급하며 정성 있는 의견과 피드백을 요청한 뒤에도
      후속 응답과 맥락 설명이 충분히 돌아오지 않는 경험을 하면서,
      내가 직접 사업을 한다면 사람을 파이프라인의 한 건처럼 다루는 방식으로는 운영하지 않겠다는 기준이 선명해졌다.
      효율과 분업은 필요하지만, 그것이 상대의 정성과 시간을 소모품처럼 취급하는 방식까지 정당화하지는 않는다고 본다.
      앞으로는 초기 접점일수록 오히려 `왜 연락했는지`, `지금 어떤 단계인지`, `다음은 무엇인지`를 분명히 전하는 태도를 지향한다.
    alternatives_rejected:
      - option: "효율을 위해 초기 접점에서는 응답성과 맥락 설명을 최소화"
        why_rejected: "단기 처리량은 높아질 수 있어도 신뢰와 브랜드를 장기적으로 갉아먹을 가능성이 큼"
      - option: "좋은 의도가 있으면 소통 부족은 감수"
        why_rejected: "의도와 별개로 상대는 실제 응답성과 존중의 수준을 경험하게 됨"
    outcome: "success"
    outcome_note: "2026-03-27 대화에서, 이 경험이 앞으로 내가 만들 사업의 운영 태도를 더 분명하게 만든 사건으로 정리됐다."

  - id: "D012"
    date: "2026-03-27"
    decision: "앞으로 팀을 이끌 때는 팀원의 정성과 맥락을 존중하는 운영 태도를 핵심 기준으로 둔다"
    rationale: >
      클래스101 접점에서 존중과 응답성이 부족하다고 느낀 경험을 돌아보며,
      나중에 소마에서 팀원을 대할 때는 이렇게 하지 않겠다는 기준이 분명해졌다.
      팀 운영에서는 실력과 역할 배치도 중요하지만,
      먼저 기대를 주거나 의견을 요청한 뒤에는 짧더라도 응답하고,
      다음 단계와 판단 기준을 숨기지 않는 태도가 신뢰를 만든다고 본다.
      효율이 필요하더라도 사람을 교체 가능한 리소스처럼 다루지 않는 것이
      내가 만들고 싶은 팀의 기본 문화라고 판단했다.
    alternatives_rejected:
      - option: "팀 운영에서는 효율을 위해 감정과 맥락보다 역할 수행만 본다"
        why_rejected: "단기 조율은 편할 수 있어도 장기적으로 신뢰와 협업 밀도를 약하게 만들 가능성이 큼"
      - option: "좋은 팀은 실력만 충분하면 존중 방식은 크게 중요하지 않다"
        why_rejected: "실제 경험상 존중과 응답성은 같이 일하고 싶은 마음과 몰입도에 직접 영향을 줌"
    outcome: "success"
    outcome_note: "2026-03-27 대화에서, 이 경험이 훗날 소마 팀 운영과 협업 태도의 기준으로 남아야 한다는 점을 사용자 본인이 분명히 확인했다."

  - id: "D013"
    date: "2026-03-28"
    decision: "현재 팀빌딩 공개용 데모 프로젝트명은 `find-team-feat`으로 고정한다"
    rationale: >
      초기에는 Hupository 기반 장기 비전을 설명하는 이름으로 `PersonaMirror`를 썼고,
      3/25에는 800명 단체카톡방 운영자와 대화한 뒤 공유 링크의 front door를 박세종 PR 중심으로 급하게 pivot하며
      `sejong-pr` 감각이 생겼다.
      그러나 3/28 세션에서 현재 공개 페이지의 1차 고객은 `팀빌딩 문제에 막막함을 느끼는 사람`이며,
      첫 화면은 내 소개보다 `나는 이 문제를 어떻게 접근하고 있는가`를 더 먼저 보여줘야 한다는 점이 분명해졌다.
      `find-team-feat`은 지금 데모가 약속하는 범위인 `후보를 좁히고 대화를 시작하게 돕는 팀빌딩 문제 접근`을
      `sejong-pr`보다 더 직접적으로 드러낸다.
    alternatives_rejected:
      - option: "PersonaMirror 유지"
        why_rejected: "장기 비전 이름으로는 유효하지만, 현재 팀빌딩 공개 데모의 문제 중심 front door를 바로 설명하기엔 너무 넓다"
      - option: "sejong-pr 유지"
        why_rejected: "박세종 PR front door라는 중간 피벗은 설명하지만, 독자가 당장 겪는 팀빌딩 문제를 전면에 두지는 못한다"
    outcome: "success"
    outcome_note: "앞으로 현재 공개용 데모 프로젝트와 관련된 문서·카피에서는 `find-team-feat`을 우선 사용한다."

  - id: "D014"
    date: "2026-03-28"
    decision: "현재 팀빌딩 공개용 데모 프로젝트명은 `team-fit`으로 다시 축약해 고정한다"
    rationale: >
      같은 날 `find-team-feat`까지는 문제 중심 방향이 잘 잡혔지만,
      실제로 반복해서 부르고 공유하기에는 이름이 길다는 판단이 생겼다.
      `team-fit`은 지금 데모가 다루는 핵심 문제를 유지하면서도 더 짧고,
      노션·카피·대화에서 반복 사용하기 쉬운 이름이다.
    alternatives_rejected:
      - option: "find-team-feat 유지"
        why_rejected: "문제의식은 분명하지만 실제 공유와 반복 호출에 다소 길다"
      - option: "sejong-pr 재사용"
        why_rejected: "박세종 PR front door의 맥락은 담지만 팀빌딩 문제 자체를 이름에서 직접 드러내지 못한다"
    outcome: "success"
    outcome_note: "앞으로 현재 공개용 데모 프로젝트와 관련된 문서·카피에서는 `team-fit`을 우선 사용한다."

  - id: "D015"
    date: "2026-03-28"
    decision: "team-fit의 root experience는 박세종 PR 소개보다 `누구와 먼저 대화할지 좁히는` 탐색형 데모로 둔다"
    rationale: >
      3/28 개발 과정에서 현재 독자가 가장 먼저 반응하는 지점은 `박세종이 누구인가` 자체보다
      `팀빌딩에서 누구와 먼저 대화해야 하는지 막막하다`는 문제라는 점이 더 선명해졌다.
      그래서 기존 team-fit checklist를 유지하기보다
      `문제 한 문장 + MBTI 5축 + SDGs 최대 3개 + 800자 Markdown + AI 후속 질문 3회`의 interview-first flow로 바꾸고,
      추천도 `최적 팀원 확정`이 아니라 `우선 대화해볼 3명`을 제안하는 conversation-priority 구조로 재설계했다.
      결과 화면 역시 단순 판정 페이지보다 recommendation, fit-score feedback, candidate directory,
      lighter transcript UI를 포함한 editable workspace 쪽이 현재 제품 약속과 더 잘 맞는다고 판단했다.
    alternatives_rejected:
      - option: "박세종 PR 중심 소개 페이지를 계속 root experience로 유지"
        why_rejected: "신뢰 레이어로는 유효하지만, 팀빌딩 문제를 풀고 싶어 들어온 독자의 현재 고민과 첫 접속이 느려진다"
      - option: "추천 결과를 최적 팀원 확정처럼 보이는 매칭기 구조로 설계"
        why_rejected: "현재 데이터와 도메인 이해 수준에서 과한 확실성을 약속하게 되고, 실제 가치인 대화 시작 지원을 흐릴 수 있다"
    outcome: "success"
    outcome_note: "앞으로 team-fit은 `대화 우선순위 설계`를 중심 철학으로 삼고, PR 정보는 이를 받쳐주는 신뢰 레이어로 배치한다."

  - id: "D016"
    date: "2026-03-29"
    decision: "소마 자기소개 노션의 front door는 긴 Creator PR 소개문보다 `귀인` one-pager 구조를 우선한다"
    rationale: >
      예비 3번 대기와 워크숍 연결 맥락에서는 `내가 누구인가`를 길게 설명하는 방식보다
      `나는 어떤 문제를 왜 풀고 있고, 지금 어디까지 만들어봤는가`를 한 장짜리 startup memo처럼 보여주는 편이 더 설득력이 높다고 판단했다.
      따라서 자기소개 노션은 `Problem -> Why now -> Solution -> Wedge -> Proof -> Ask` 순서의
      `귀인` one-pager를 중심에 두고, Hupository와 team-fit은 그 하위 검증 레이어로 설명한다.
    alternatives_rejected:
      - option: "Creator PR 중심의 사람 소개를 front door로 유지"
        why_rejected: "문제의식과 현재 프로젝트 구조를 이해시키는 데 시간이 더 걸리고, 워크숍에서 관심자를 모으는 목적과도 덜 맞는다"
      - option: "장문의 자기소개 노션으로 구성"
        why_rejected: "링크 공유 환경에서는 길게 읽히기보다 한 장짜리 사업기획 메모처럼 빠르게 이해되는 편이 더 유리하다"
    outcome: "success"
    outcome_note: "2026-03-29 기준 `doc/notion/2026-03-29_gwiin_one_pager.md` 초안을 정리했고, 추가합격 연락 시 바로 공유 가능한 노션 구조로 준비해두었다."

  - id: "D017"
    date: "2026-03-29"
    decision: "Hupository의 첫 운영 모델은 `오픈 템플릿 + 소수 피드백` 구조로 시작한다"
    rationale: >
      지금 단계에서 중요한 것은 큰 강의 제작보다 실제 사용 구조와 시장 반응을 작게 검증하는 것이다.
      누구나 clone해서 써볼 수 있는 starter를 먼저 만들고, 나는 동시 진행 최대 2명에게만 4주 동안 피드백을 주는 구조가
      현재 집중 용량과 장기 사명 양쪽에 더 잘 맞는다고 판단했다.
      이 방식은 노이즈를 줄이고, `무료라서 들어온 사람`보다 `정말 기록과 방향을 바꾸고 싶은 사람`을 만나는 데도 유리하다.
    alternatives_rejected:
      - option: "class101 같은 외부 플랫폼용 큰 강의를 먼저 제작"
        why_rejected: "시장 반응을 보기 전에 제작 비용과 약속 범위가 너무 커진다"
      - option: "무료 대규모 모집형 코칭으로 시작"
        why_rejected: "운영 노이즈가 커지고 첫 검증 신호가 흐려질 가능성이 높다"
    outcome: "pending"
    outcome_note: "starter 템플릿과 2인 피드백 베타 구조는 정리됐고, 다음 단계는 `휴포지토리 사용법` 콘텐츠와 실제 사용자 반응으로 첫 검증을 시작하는 것이다."

