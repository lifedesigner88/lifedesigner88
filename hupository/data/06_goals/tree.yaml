# 목표 트리 — data/06_goals/tree.yaml
# 장기 목표와 하위 목표의 계층 구조를 정의합니다.
# lifetime.yaml : 더 상위 사명과 시간축
# goals.yaml : read-only legacy archive
# tree.yaml : 목표 구조와 연결 관계 (what / why this)
# progress.yaml : tree.yaml 기준 각 목표의 현재 진척과 근거 (how far)

as_of: "2026-03"

# ─────────────────────────────────────────
# 상위 연결 (lifetime.yaml)
# ─────────────────────────────────────────
# 이 트리는 lifetime.yaml 의 "30대 (2025-2028)" 아래에 위치합니다.
# 평생 사명 → 30대 사명 → 이 트리의 G-LIFE → 중간/단기 목표
parent_lifetime: "lifetime.yaml#30대"

# ─────────────────────────────────────────
# 목표 트리
# ─────────────────────────────────────────
# 읽는 법:
#   long_term  →  현재 집중하고 있는 장기 비전
#   mid_term   →  1-3년 내 도달할 중간 목표
#   short_term →  지금 당장 실행 중인 하위 목표
# ─────────────────────────────────────────

goals:

  - id: "G-LIFE"
    type: long_term
    title: "라이프디자이너 — 기술+교육으로 사람들이 삶을 더 잘 설계하도록 돕기"
    horizon: "5년+"
    status: active
    children:

      - id: "G-EDU-TECH"
        type: mid_term
        title: "교육+기술 통합 서비스 구축 (세종클래스)"
        horizon: "1-3년"
        status: active
        parent: "G-LIFE"
        children:

          - id: "G-SEJONG-01"
            type: short_term
            title: "첫 유료 수강생 확보"
            horizon: "3개월"
            status: in_progress
            parent: "G-EDU-TECH"

          - id: "G-SEJONG-02"
            type: short_term
            title: "월 수익 100만원 달성"
            horizon: "6개월"
            status: not_started
            parent: "G-EDU-TECH"

          - id: "G-SEJONG-03"
            type: short_term
            title: "콘텐츠 채널 확장 (클래스101 등)"
            horizon: "6개월"
            status: in_progress
            parent: "G-EDU-TECH"
            notes: "외부 교육 플랫폼과 콘텐츠 채널까지 확장해 유입 경로를 넓힌다."

      - id: "G-AI-BUILDER"
        type: mid_term
        title: "AI 빌더 역량 확보 — 기획부터 배포까지 혼자 만드는 AI 서비스"
        horizon: "1-2년"
        status: active
        parent: "G-LIFE"
        children:

          - id: "G-AI-01"
            type: short_term
            title: "AI Agent 개발 역량 확보 (LangGraph · FastAPI)"
            horizon: "6개월"
            status: in_progress
            parent: "G-AI-BUILDER"

          - id: "G-AI-02"
            type: short_term
            title: "Hupository AI Agent 완성 (일상 수집 → 자동 업데이트)"
            horizon: "1년"
            status: in_progress
            parent: "G-AI-BUILDER"
            notes: "저널링, 현재 상태 동기화, 추출 자동화를 하나의 AI 코칭 시스템으로 연결한다."

          - id: "G-PM-01"
            type: short_term
            title: "PersonaMirror 공개 유즈케이스 정리 (3/25 목표)"
            horizon: "1주"
            status: in_progress
            parent: "G-AI-BUILDER"
            notes: >
              PersonaMirror의 첫 공개 유즈케이스.
              단기적으로는 ASM 17 Community / Creator PR 맥락에서 팀빌딩 자기소개와 실행력 증명을 동시에 보여주는 front door를 정리한다.
              장기적으로는 라이프디자인 서비스의 공개 진입점으로 확장한다.
              세부 구현 상태와 근거는 progress.yaml 및 프로젝트 문서에서 관리한다.

          - id: "G-AI-03"
            type: short_term
            title: "SW마에스트로 17기 합격 → AI 네트워크·역량 확보"
            horizon: "1개월"
            status: in_progress
            parent: "G-AI-BUILDER"
            notes: "소마는 장기 목표를 가속할 수 있는 네트워크 옵션이며, 결과에 따라 단기 운영 전략이 분기된다."

      - id: "G-LIFEDESIGN-SVC"
        type: mid_term
        title: "라이프디자인 서비스화 — Hupository·PersonaMirror를 실제 서비스로"
        horizon: "2-3년"
        status: active
        parent: "G-LIFE"
        independence: "소마 합격/불합격과 무관하게 진행. 소마는 가속 옵션 중 하나."
        notes: >
          Hupository: Git + YAML + AI로 삶을 설계하는 시스템. 강의 소재이자 서비스 원형.
          PersonaMirror: 개인 페르소나 도구. Hupository 데이터로 최종 비전 데모.
          이 둘이 합쳐지면 G-LIFE(라이프디자이너) 사명의 실제 구현체.
          강의 방향: 기술(Git·YAML·AI Agent)로 삶을 설계하는 법 — 시장에 없는 카테고리.
        children:
          - id: "G-LS-01"
            type: short_term
            title: "Hupository 강의 시리즈 기획 (강의 소재화)"
            horizon: "3개월"
            status: not_started
            parent: "G-LIFEDESIGN-SVC"
          - id: "G-LS-02"
            type: short_term
            title: "PersonaMirror 독립 서비스 배포 및 운영"
            horizon: "6개월"
            status: in_progress
            parent: "G-LIFEDESIGN-SVC"
            notes: "G-PM-01 MVP 완료 후 이어지는 단계"

      - id: "G-COMMUNITY"
        type: mid_term
        title: "커뮤니티+플랫폼 — 사람을 모으고 연결하는 구조 만들기"
        horizon: "3-5년"
        status: not_started
        parent: "G-LIFE"
        notes: "세종클래스 수익화 안착 이후 단계"

