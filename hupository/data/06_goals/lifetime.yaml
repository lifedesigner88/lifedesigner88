# 평생 목표 — data/06_goals/lifetime.yaml
# 만 100세를 기준으로 10년 단위 사명을 정의합니다.
# tree.yaml 의 장기목표(G-LIFE)는 이 파일의 "현재 10년(30대)" 아래에 연결됩니다.

as_of: "2026-03"
person: parksejong
birth_year: 1988
birth_month_day: "09-12"
life_target_age: 100          # 만나이 기준
life_end_year: 2088           # 1988 + 100

# 나이 표기 규칙: 모든 나이는 만나이 (대한민국 법정 기준)
# 만나이 = 생일 지남: 현재연도 - 출생연도 / 생일 전: 현재연도 - 출생연도 - 1
# 예) 2026-03 기준 → 생일(9/12) 미도래 → 만 37세
age_convention: "만나이 (대한민국 법정 기준) — schema.yaml#conventions.age 참조"

# ─────────────────────────────────────────
# 평생의 사명 (최상위 목표)
# ─────────────────────────────────────────
lifetime_mission: >
  삶을 설계하는 질문을 붙잡고,
  기술과 교육으로 더 많은 사람이 자신의 삶을 더 잘 설계하도록 돕는다.

# ─────────────────────────────────────────
# 10년 단위 사명
# 현재(37세)에서 가장 가까운 시대부터 역순으로 작성.
# 미래 시대일수록 현재는 비워두고, 점점 채워나간다.
# ─────────────────────────────────────────
decades:

  - era: "30대"
    age_range: "37-40"
    year_range: "2025-2028"
    status: current           # current | future | done
    decade_mission: >
      교육과 기술을 직접 만드는 사람이 된다.
      1인 창업자로서 세종클래스를 키우고,
      AI 빌더 역량을 확보해 다음 10년의 기반을 만든다.
    key_themes:
      - "1인 창업 안착 (세종클래스)"
      - "AI 빌더 역량 확보"
      - "수익 독립의 첫 증명"
    linked_to: "tree.yaml#G-LIFE"    # 하위 목표 트리 연결
    notes: "현재 집중 구간. tree.yaml 이 이 시대의 세부 실행 계획."

  - era: "40대"
    age_range: "40-50"
    year_range: "2028-2038"
    status: future
    decade_mission: >
      교육×기술 플랫폼을 확장해 더 많은 사람의 삶 설계를 돕는 구조를 만든다.
      혼자가 아닌 팀과 커뮤니티로 영향력을 확장한다.
    key_themes:
      - "세종클래스 → 플랫폼/커뮤니티로 확장"
      - "AI 기반 라이프디자인 서비스"
      - "팀 빌딩 & 조직 운영 역량"
    notes: "30대 기반 위에 스케일업. 구체화는 37-40세 실행 결과를 보고 수정."

  - era: "50대"
    age_range: "50-60"
    year_range: "2038-2048"
    status: future
    decade_mission: null      # 아직 정의하지 않음 — 40대 결과 보고 채울 것
    key_themes:
      - "영향력의 사회적 확산"
      - "후세대 멘토링 & 교육 시스템 설계"
    notes: "미정. 40대 후반에 구체화."

  - era: "60대"
    age_range: "60-70"
    year_range: "2048-2058"
    status: future
    decade_mission: null
    key_themes:
      - "지식과 경험의 집대성"
      - "커뮤니티/기관 레거시 설계"
    notes: "미정."

  - era: "70대"
    age_range: "70-80"
    year_range: "2058-2068"
    status: future
    decade_mission: null
    key_themes:
      - "삶의 지혜를 다음 세대로 전달"
    notes: "미정."

  - era: "80대"
    age_range: "80-90"
    year_range: "2068-2078"
    status: future
    decade_mission: null
    notes: "미정."

  - era: "90대"
    age_range: "90-100"
    year_range: "2078-2088"
    status: future
    decade_mission: null
    notes: "미정."

# ─────────────────────────────────────────
# 장기목표 탐색 참조 프레임워크
# ─────────────────────────────────────────
goal_discovery_framework:
  name: "UN SDGs (유엔 지속가능발전목표)"
  goals_count: 17
  targets_count: 169
  when_to_use: >
    lifetime_mission 또는 decade_mission 이 비어있거나,
    사용자가 장기목표를 정하는 데 막막함을 느낄 때.
  how: "ai/prompts/monthly_review.md 참조"
  current_sdg_alignment:
    # values.yaml · vectors.yaml 기준 현재 높은 공명 가능성
    - sdg: 4
      label: "양질의 교육"
      reason: "teaching_drive:5, education_sharing 가치관, 세종클래스"
    - sdg: 8
      label: "양질의 일자리와 경제성장"
      reason: "entrepreneurship, 1인 창업, AI 빌더"
    - sdg: 10
      label: "불평등 감소"
      reason: "community_drive:5, life_design 가치관"
    - sdg: 17
      label: "글로벌 파트너십"
      reason: "community_organizer, 국제캠프 PM 경험"

# ─────────────────────────────────────────
# 정렬 체크 원칙 ★ (최우선)
# ─────────────────────────────────────────
alignment_check_principle: >
  AI는 매주 코칭 세션(weekly_coaching.md)마다
  현재의 결정·활동이 이 파일의 lifetime_mission 및 현재 10년 decade_mission 에서
  벗어나고 있는지 반드시 확인해야 한다.

  벗어남이 감지되면 두 가지를 명확히 구분할 것:
    [A] goal_evolved : 장기목표 자체가 성장·진화한 것
                       → 이 파일(lifetime.yaml) 및 tree.yaml 업데이트를 제안
    [B] drifting     : 목표는 유지인데 일시적으로 한눈을 파는 것
                       → 즉시 인식시키고 복귀 방안을 함께 찾을 것

  단정하지 말고 반드시 질문으로 확인한 후 판정할 것.
  침묵(해당 목표 관련 활동 전무)도 drifting 의 신호로 볼 것.

# ─────────────────────────────────────────
# 업데이트 정책
# ─────────────────────────────────────────
update_policy: >
  - 현재 10년(current): tree.yaml 과 연동해 수시 업데이트.
  - 다음 10년(nearest future): 연 1회 검토 및 구체화.
  - 그 이후: 해당 시대가 5년 이내로 가까워질 때 구체화 시작.
  - decade_mission 은 사람이 직접 작성. AI는 제안만 할 것.
