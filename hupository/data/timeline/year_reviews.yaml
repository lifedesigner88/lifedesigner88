year_reviews:
  - year: 2007
    age: 19
    fact_summary: >
      서울시립대 전자전기컴퓨터공학부 입학. 160명 신입생 중 B반 40명의 반장을 맡았다.
      만우절에 교복 입고 등교하기, 도곡동 타워팰리스 근처 '델리'(수능 이후 알바했던 카레 패밀리 레스토랑) 통째 빌려 반 회식,
      동덕여대와 1박2일 조인MT, 축구대회 사전 트레이닝 등 다른 반 반장들이 부러워할 만큼 다채로운 기획으로 반을 이끌었다.
      유스호스텔 여행동아리에도 들어갔다.
      그러나 2학기부터 조울증 사이클이 처음 찾아왔다. 기력이 빠지고, 사람이 무서워지고, 성적이 내려갔다.
      1학기 활동 덕분에 이듬해 학생회 임원 추대는 받았지만, 내면은 이미 흔들리고 있었다.
    key_tracks:
      - "B반 반장 행사 기획 (만우절·MT·회식·축구)"
      - "유스호스텔 여행동아리"
      - "조울증 첫 등장 (2학기)"
    inferred_shift: "사람을 모으고 프로그램을 설계하는 감각이 처음 선명하게 드러난 해. 동시에 조울증 사이클의 첫 신호가 나타난 해."
    source_refs:
      - "https://blog.naver.com/lifedesigner88/223506539662"

  - year: 2008
    age: 20
    fact_summary: >
      친한 07학번 선배(2년 재수)가 학생회장 출마를 제안하며 부회장을 맡았다. 자신도 회장을 원했지만
      그 형이 좋은 사람이라 생각해 함께 출마, 당선. 봄이 되자 기운이 돌아왔고 전성기를 맞았다 —
      체육대회·MT·축제에서 16명의 1학년 학생들을 선발해 이끌고, 여자친구도 생겼다.
      그 기세로 ROTC에도 지원해 합격했다.
      그러나 2학기, 다시 조울증이 찾아왔다. 여자친구와도 헤어졌다(주원인은 아니라고 봄 — 호르몬 사이클의 문제).
      기력을 잃고 수업 출석만 겨우 했다. 겨울 ROTC 훈련소에 입소했지만 이틀도 안 돼 눈물로 퇴소를 결정했다.
      부모님이 사실을 알게 됐고 정신과를 방문해 조울증(bipolar) 진단을 받았다.
      이 시기 삶을 끊겠다는 다짐도 했고, 실제 시도도 했다. 부모님의 존재가 삶을 붙잡았다.
      # visibility: secret (자살 시도 관련 내용)
    key_tracks:
      - "학생회 부회장 (공동 출마·당선)"
      - "봄 전성기 (체육대회·MT·축제 기획)"
      - "ROTC 합격 및 훈련소 조기 퇴소"
      - "조울증 진단 (정신과)"
      - "자살 시도 및 부모님의 개입"
    inferred_shift: >
      조울증이 계절성 사이클로 반복된다는 것을 처음 몸으로 알게 된 해.
      이 경험이 이후 '인생이란 무엇인가'를 탐구하게 만든 근본 동기가 됐다.
    source_refs:
      - "https://blog.naver.com/lifedesigner88/223507704993"

  - year: 2009
    age: 21
    fact_summary: >
      1~2월, 두 달가량을 집에서만 보냈다. ROTC 동기들 사이에 조울증으로 퇴소했다는 소문이 퍼져 있었고,
      과연 학교에 돌아갈 수 있을까 하는 공포가 컸다.
      봄이 되자 기운이 돌아왔고, '대인공포를 극복하자'는 비전을 세웠다.
      1일 레스토랑 서빙 알바를 반복하며 사람을 만나는 연습을 했다.
      네이버 카페 대인공포 모임에서 활동하다 부당 운영을 지적했다가 운영권을 넘겨받았고,
      나만의 대인공포 극복 프로그램을 직접 설계해 운영했다. 사람들은 좋아했지만
      잘 변하지 않고 계속 의지하는 패턴에 번아웃이 왔고, 9월 복학과 함께 정리했다.
      태권도 동아리 '회오리'에서 KT&G 연합 MT에 참가해 마음에 드는 여성에게 용기 내 번호를 물어봤고,
      연애로 이어졌다. 자신감을 얻어 9월에 역학기로 복학했다.
      공대 역학기 복학 — 동기들은 대부분 입대, 후배들은 이미 학생회 임원. 어색한 환경.
      이때부터 전공 수업은 최소화하고 심리학·경영학·창업·인적자원관리 수업을 들었다.
      인공뇌를 만들어보고 싶다는 생각으로 C언어·자료구조·AI 과목도 병행했다.
      12월, 다른 모임에서 대순진리회 포덕인을 만났다. 내 삶이 왜 이렇게 흘러가는지에 대한
      강한 호기심과, 또 겨울이 오면 다시 우울해질까 봐 두렵다는 마음으로 따라갔다.
    key_tracks:
      - "대인공포 극복 비전 수립 + 알바 실습"
      - "대인공포 카페 운영권 획득 → 직접 프로그램 제작"
      - "태권도 동아리 회오리 + KT&G 연합 MT → 새 연애"
      - "역학기 복학 + 커리큘럼 전환 (심리·경영·창업·AI)"
      - "대순진리회 첫 접촉 (12월)"
    inferred_shift: >
      대인공포 카페 운영 경험은 훗날 '사람은 프로그램으로 쉽게 변하지 않는다'는 통찰로 이어진다.
      커리큘럼 전환(전공→심리·창업·AI)은 교육자-기획자-개발자 정체성의 씨앗이 됐다.
    source_refs:
      - "https://blog.naver.com/lifedesigner88/223508925221"

  - year: 2010
    age: 22
    fact_summary: >
      2010년 초, 대순진리회에 공식 가입했다. 여자친구는 반대했고, 나는 대순진리회를 택하며 헤어졌다.
      동양철학의 세계에 매료됐다.
      2월, 씨푸드오션 홀서빙 알바 중 왼쪽 망막박리가 발생해 수술을 받았다.
      조울증 판정으로 공익근무요원(7월 입대 예정)이었는데, 망막박리 수술로 완전 면제 판정을 받았다.
      수도 몰입 시점에 군면제를 받은 것을 조상님이 수도를 시키기 위해 힘을 써줬다고 해석했다.
      1학기에는 수도를 할까 말까 고민하면서 학교와 외부 커뮤니티 활동을 병행했다.
      카르페디엠 모임에 가입해 활동을 시작했다.
      수도를 통해 조울증 사이클을 벗어났다는 착각과 함께, 진리를 깨달은 느낌이 있었다:
      사람들은 업보로 고통받고, 공덕을 쌓아야 그 빚을 갚을 수 있다 —
      마치 공무원이 국가의 일을 수행하며 국가의 보호를 받듯, 상제님의 보호를 받는 것.
      2학기에는 확신을 갖고 수도에 올인하기 위해 휴학했다.
      이후 부산 리더십 캠프에서 서울 참가자 20여 명을 2일 먼저 모아 관광까지 리드했고,
      그 모습을 본 너울가지 1기 운영자의 제안으로 너울가지 1기(바르게살기중앙협의회 주도 워크샵)에 참여했다.
      처음엔 포덕 목적이었지만, 술·담배·스마트폰 없이 사람 대 사람으로 만나는 즐거움과
      내가 기획한 자리에서 사람들이 짓는 표정에 매료되어 계속하게 됐다.
    key_tracks:
      - "대순진리회 가입 + 여자친구 이별"
      - "씨푸드오션 알바 → 망막박리 수술 → 군면제"
      - "카르페디엠 모임 가입 (1학기 고민기, 이후 꾸준히 활동)"
      - "2학기 휴학 (수도 올인)"
      - "부산 리더십 캠프 리딩 → 너울가지 1기 참여"
    inferred_shift: >
      카르페디엠 가입, 너울가지 참여, 망막박리·군면제까지 — 외부 커뮤니티로의 본격 진입 해.
      기획의 즐거움을 순수한 형태로 처음 발견했다.
      '라이프디자이너' 선언은 이듬해(2011) 카르페디엠 비전 선언 행사에서 이루어진다.
    source_refs:
      - "https://blog.naver.com/lifedesigner88/223510100483"

  - year: 2011
    age: 23
    fact_summary: >
      카르페디엠 비전 선언 행사에서 '라이프디자이너'를 자신의 꿈으로 선언했다. ★
      종교적 사명감을 종교색 없이 표현하기 위해 고른 이름:
      사람들이 더 나은 삶을 살도록 돕겠다는 사명을 세속적 언어로 선언한 것.
      너울가지 2기 사무국장으로 임명됐다. 카르페디엠 부운영자를 회장으로 모셔와 2기를 시작했다.
      주제는 '바른 대학생활' (바르게살기중앙협의회 비용 지원).
      공대 술문화에 반감을 가졌던 나는 술·담배·스마트폰 없는 진짜 MT를 기획했다 — '엠티의 정석 1'.
      다양한 학교에서 참가자를 모집, 포덕 목적도 있었지만 사람 대 사람으로 인연을 맺게 하는 방식으로 설계.
      반응은 좋았고, 참가자 중 일부를 대순진리회에 소개하며 수도생으로 인정도 받았다.
      그러나 7월, 조울증이 다시 돌아왔다. 수도를 시작하면서 약을 끊었었는데 —
      수도로 극복했다는 믿음이 무너지는 순간이었다.
      8월, 너울가지 3기를 다른 회장에게 넘겼다. 다시 방황이 시작됐다.
      정신과를 다시 찾아 약을 재개했다.
      3기에는 참가자로 참여하면서 4기를 어떻게 운영할지 고민하며 보냈다.
      겨울에는 호텔 서빙 알바로 용돈을 모았다.
    key_tracks:
      - "카르페디엠 비전 선언 행사 → '라이프디자이너' 선언 ★"
      - "너울가지 2기 사무국장 + 엠티의 정석 1 기획"
      - "수도 확신 → 7월 조울증 재발 → 약 재개"
      - "3기 회장 이양 + 3기 참가자로 활동"
      - "4기 기획 구상"
    inferred_shift: >
      선언과 실행이 맞물린 직후 조울증이 재발하며 수도에 대한 첫 번째 균열이 생긴 해.
      그러나 '라이프디자이너'라는 정체성은 흔들리지 않았다.
    source_refs:
      - "https://blog.naver.com/lifedesigner88/223511198423"

  - year: 2012
    age: 24
    fact_summary: >
      싱가폴-인도네시아 솔로 여행으로 긴 휴학의 마무리를 지었고 복학했다.
      너울가지 4기 회장을 맡아 '엠티의 정석 2'를 기획했다 (1학기).
      바르게살기중앙협의회 지원으로 안동·백령도 버스 투어 형태 — 강의·체육대회·역사 탐방.
      그러나 협의회가 기획 주도권을 가져가는 구조라 내가 원하는 기획이 아니었다.
      2학기에는 너울가지 5기로 바르게살기중앙협의회에서 독립했다 (총장 교체 계기).
      '엠티의 정석 3' — 당시 유행하던 '정글의 법칙' 컨셉으로 캠핑.
      술·담배·스마트폰 없이 공생하며 만남 자체를 중시, 기획팀 아이디어를 현실화하는 구조로 진행.
      포토샵도 이 시기에 익혔다.
    key_tracks:
      - "싱가폴-인도네시아 솔로 여행 + 복학"
      - "너울가지 4기 (엠티의 정석 2, 안동·백령도, 바르게살기 주도)"
      - "너울가지 5기 독립 (엠티의 정석 3, 정글의 법칙 캠핑)"
      - "포토샵 습득"
    inferred_shift: "외부 지원에서 독립해 자기 기획 철학을 처음 온전히 구현한 해."
    source_refs:
      - "https://blog.naver.com/lifedesigner88/223512124417"

  - year: 2013
    age: 25
    fact_summary: >
      너울가지 6기는 다른 친구가 회장을 맡았다. '엠티의 정석 4' — 폐교 개조 장소에서 고등학교 수련회 컨셉.
      너울가지 7기에서 회장으로 복귀했다. '엠티의 정석 5' — '꽃보다 남자' 컨셉, 예능 게임들로 구성.
      6기 기간 동안 복학해 졸업 학점을 채웠고, 취업 대신 창업을 고민하며 졸업유예를 결정했다.
    key_tracks:
      - "너울가지 6기 (다른 회장, 엠티의 정석 4, 폐교 수련회)"
      - "너울가지 7기 회장 복귀 (엠티의 정석 5, 꽃보다 남자)"
      - "복학 + 졸업학점 이수"
      - "졸업유예 결정"
    inferred_shift: "취업보다 직접 만들고 운영하는 삶 쪽으로 기울기 시작한 해."
    source_refs:
      - "https://blog.naver.com/lifedesigner88/223513197576"

  - year: 2014
    age: 26
    fact_summary: >
      너울가지 8기, 모든 역량을 총동원한 마지막 기수.
      '엠티의 정석 6' — 묻지마 엠티. 모든 신상정보를 가리고 술·담배·스마트폰 없이 서로 알아가는 컨셉.
      홍보물·영상물 대부분을 직접 제작했다.
      6월에 학점을 모두 마치고 졸업유예 상태 돌입.
      너울가지에서 쌓은 경험으로 대학생 방학 설계 프로그램 '버킷리스트' 모임을 만들어 수익화를 시도했다.
      프로그램은 좋았지만 대학생은 큰 비용을 낼 구조가 아니었다 — 수익화 실패. 실패도 자산이었다.
    key_tracks:
      - "너울가지 8기 (엠티의 정석 6, 묻지마 엠티) — 마지막 기수"
      - "홍보물·영상물 직접 제작"
      - "졸업유예 (6월 학점 이수 완료)"
      - "버킷리스트 프로그램 런칭 → 수익화 실패"
    inferred_shift: "커뮤니티 기획자로서 절정을 찍고, 처음으로 수익화를 시도한 해. 실패에서 시장 감각을 얻었다."
    source_refs:
      - "https://blog.naver.com/lifedesigner88/223514667345"

  - year: 2015
    age: 27
    fact_summary: >
      2015년 2월, 입학 8년 만에 공식 졸업.
