# ── 독서 성향 분석 ──────────────────────────────────────────────
reading_profile:

  tendency_1:
    label: "뇌과학 집착형"
    description: >
      전체 독서의 35%가 뇌과학. 단순 교양서 수준을 넘어 신경과학의 원리(켄델 전문 교재),
      뇌의식의 우주(에델만·토노니), 시냅스와 자아 등 학술 수준 도서까지 독파.
      의식·감정·학습·기억을 뇌의 물리적 작동 원리로 이해하려는 일관된 지향.
    keywords: ["의식", "감정의 기원", "학습 메커니즘", "신경과학"]

  tendency_2:
    label: "저자 전작 탐독형"
    description: >
      마음에 드는 저자는 전작을 모두 찾아 읽는 패턴. 다마지오 7권, 르두 4권,
      하라리 4권, 이슬아 5권. 특정 사상가의 세계관을 깊이 내면화하는 방식.
    keywords: ["심층 이해", "사상 계보 추적"]

  tendency_3:
    label: "생애 전환 반영형"
    description: >
      독서 카테고리가 삶의 국면 전환을 정확히 반영함.
      교육·학습 집중(2021-2022) → 입시컨설팅 시기.
      철학·종교 탐색(2023) → 대순진리회 탈퇴 전후.
      AI·개발 등장(2023) → 개발 입문 시기.
      이슬아 탐독(2025) → 글쓰기·서사 관심 시작.
    keywords: ["삶의 질문이 독서로 연결"]

  tendency_4:
    label: "비판적 독서자"
    description: >
      평점 1점 비율 7% — 읽었지만 가치 없다고 판단한 책을 명확히 구분.
      자기계발 장르에 특히 냉정 (역행자 1점, 수학 잘하는 아이는 이렇게 공부합니다 1점 등).
      독서를 소비가 아닌 판단으로 접근하는 태도.

  tendency_5:
    label: "핵심서 재독형"
    description: >
      5점 도서를 재독하는 습관. 2025년에 2021-2023년 핵심 뇌과학서 7권을 재독.
      지식을 축적이 아닌 통합으로 다루는 방식.

  tendency_6:
    label: "과학적 신체 관리"
    description: >
      건강·신체 카테고리 12권 중 수면(워커), 호흡(네스터), 노화(싱클레어),
      척추(정선근 시리즈), 식이(퍼멀터) — 모두 과학적 근거 중심 선택.
      직관·민간요법 계열 도서 배제 경향.

  blind_spots:
    - "소설·문학 — 2025년 이슬아 전까지 거의 없음"
    - "경제·투자 — 3권에 불과"
    - "역사·인문 고전 — 단편적 접촉만"
    - "사회과학·정치 — 거의 없음"
