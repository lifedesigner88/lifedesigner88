legacy: >
  너울가지 5년간 쌓은 '사람을 모으고 경험을 설계하는' 역량이 국제 무대에서 검증된 시기.
  2019년 이후 이 경험이 입시컨설팅·교육 분야로 이어지고,
  이후 데이터/개발에 대한 관심으로 진화하는 전환점이 됨.
