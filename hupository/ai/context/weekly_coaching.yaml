# 주간 코칭 컨텍스트 — ai/context/weekly_coaching.yaml

context_for: "weekly_coaching"
preferred_model: "GPT-5.4"
generated_on: "2026-03-24"

week_schedule:
  standard: "ISO 8601"
  week_range: "월요일 00:00 ~ 일요일 23:59"
  notation: "YYYY-WXX"
  default_session_timing: "주말 또는 주 전환 시점"

prime_directive: >
  이번 주 활동과 결정이 lifetime.yaml 의 평생 사명 및
  현재 decade_mission 과 얼마나 정렬되는지 확인한다.
  벗어남이 보이면 곧바로 비난하지 말고,
  drifting 인지 goal_evolved 인지 먼저 확인한다.

reading_order:
  1:
    file: "../../data/08_now/snapshot.yaml"
    purpose: "현재 현실, 제약, 우선순위"
  2:
    file: "../../data/06_goals/lifetime.yaml"
    purpose: "평생 사명과 현재 10년 사명"
  3:
    file: "../../data/06_goals/tree.yaml"
    purpose: "현재 장기/중간/단기 목표 구조"
  4:
    file: "../../data/09_journal/{이번주}/session_draft.md"
    purpose: "진행 중 세션이 있다면 가장 최신 해석과 판단"
  5:
    file: "../../data/09_journal/{이번주}/YYYY-MM-DD.md"
    purpose: "이번 주의 실제 활동 기록"
  6:
    file: "../../data/09_journal/{직전주}/session.md"
    purpose: "지난주 약속 점검"
  7:
    file: "../../data/06_goals/progress.yaml"
    purpose: "누적 진척도 변화 체크"
  8:
    file: "../../data/08_now/decisions.yaml"
    purpose: "방향성에 영향을 준 최근 결정"
  9:
    file: "../../data/01_identity/values.yaml"
    purpose: "추천이 가치관과 어긋나지 않는지 점검"

missing_day_policy:
  detect: true
  rule: >
    비어 있는 날짜가 있으면 한꺼번에 몰아 묻지 말고,
    세션 흐름 안에서 자연스럽게 보충 여부를 확인한다.

coaching_hints:
  strengths_to_leverage:
    - "완전 몰입 방식이 효과적이다."
    - "기록과 구조화가 강점이다."
    - "배운 것을 가르치거나 시스템으로 만드는 힘이 있다."
  risks_to_watch:
    - "동시 트랙 과다"
    - "탐색 과잉으로 실행 지연"
    - "외부 이벤트 대기 중 전략 흔들림"
  good_goal_shape:
    - "이번 주 안에 끝낼 수 있는가"
    - "완료 기준이 명확한가"
    - "어떤 G-ID에 연결되는가"
    - "에너지와 현실 제약 안에서 가능한가"

work_in_progress_path: "../../data/09_journal/{decade}/{year}/{month}/{week}/session_draft.md"
output_path: "../../data/09_journal/{decade}/{year}/{month}/{week}/session.md"
