# 다음 스텝 코칭 컨텍스트 — ai/context/next_step.yaml
# GPT가 "박세종의 다음 스텝"을 빠르게 코칭할 때 읽는 컨텍스트.

context_for: "next_step_recommendation"
preferred_model: "GPT-5.4"
generated_on: "2026-03-24"

# ─────────────────────────────────────────
# 파일 읽기 순서 (우선순위 높은 것부터)
# ─────────────────────────────────────────
priority_reads:
  1:
    file: "../../data/08_now/snapshot.yaml"
    purpose: "현재 각 트랙의 상태, 제약조건, 보류 중인 외부 이벤트"
  2:
    file: "../../data/06_goals/lifetime.yaml"
    purpose: "평생 사명 + 현재 10년 사명"
  3:
    file: "../../data/06_goals/tree.yaml"
    purpose: "현재 장기/중간/단기 목표 구조"
  4:
    file: "../../data/06_goals/progress.yaml"
    purpose: "tree.yaml 기준 각 목표의 현재 진척도"
  5:
    file: "../../data/09_journal/{최근 session_draft 또는 session}.md"
    purpose: "가장 최신 세션 맥락"
  6:
    file: "../../data/08_now/decisions.yaml"
    purpose: "최근 주요 의사결정과 방향성 맥락"
  7:
    file: "../../data/01_identity/values.yaml"
    purpose: "핵심 가치관 — 추천이 가치관과 일치하는지 검증"

# ─────────────────────────────────────────
# 추론 힌트 — 이 사람 특유의 패턴
# ─────────────────────────────────────────
inference_hints:

  patterns_that_worked:
    - "완전 몰입 방식이 효과적 (부트캠프 120일 개근, 프로젝트 1위)"
    - "기록·구조화가 강점 (19년 회고, Hupository 설계)"
    - "커뮤니티/교육 운영에서 반복적으로 성과"
    - "새 분야 진입 시 단기 집중 학습 후 적용 (뇌과학→물리→코딩)"

  patterns_to_watch:
    - "너무 많은 트랙 동시 진행 시 분산 — 집중력 저하"
    - "탐색 단계가 길어지면 실행이 늦어지는 경향"

  decision_trigger_questions:
    - "SW마에스트로 17기 결과가 나왔는가? → 전략 분기점"
    - "세종클래스 첫 유료 수강생이 발생했는가? → 마케팅 방향 결정"
    - "financial runway가 3개월 미만인가? → 수익화 즉시 우선"
    - "현재 동시 진행 트랙이 3개 초과인가? → 우선순위 정리 필요"

# ─────────────────────────────────────────
# 추천 출력 형식
# ─────────────────────────────────────────
output_format:
  structure:
    - "현재 상태 요약 (2줄)"
    - "지금 가장 중요한 초점 1개"
    - "다음 3개 행동"
    - "지금 안 해도 되는 것"
    - "확인해야 할 질문 1개"
  tone: "직접적이고 간결하게. 실행 중심."
  language: "한국어"

# ─────────────────────────────────────────
# 출력 저장 위치
# ─────────────────────────────────────────
output_path: "../outputs/next_step/"
output_naming: "YYYY-MM-DD.md"
