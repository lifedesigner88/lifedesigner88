core_values:
  - id: life_design
    label: "라이프디자인"
    description: >
      자신의 삶을 스스로 설계하고 살아야 한다는 신념.
      2011년 선언 이후 15년간 일관된 북극성.
    evidence_level: high

  - id: growth_learning
    label: "성장과 학습"
    description: >
      지속적인 자기계발. 뇌과학, 물리학, 철학, 코딩을
      독학으로 깊이 탐구하는 삶의 태도.
    evidence_level: high

  - id: education_sharing
    label: "교육과 나눔"
    description: >
      가르치는 것을 통해 자신도 성장한다고 믿음.
      청년단체 → 입시컨설팅 → 자격증 강사 → 개발 교육 → 세종클래스로 이어지는 일관된 흐름.
    evidence_level: high

  - id: community_connection
    label: "공동체와 연결"
    description: >
      너울가지, 국제캠프, 개발자 커뮤니티 등
      사람을 모으고 연결하는 활동에서 의미를 찾음.
    evidence_level: high

  - id: system_thinking
    label: "시스템화"
    description: >
      반복되는 일을 시스템으로 만들려는 경향.
      교육도 플랫폼화, 배포도 코드화(Terraform).
    evidence_level: medium

core_questions:
  - "어떻게 사는 것이 사람답게 사는 것일까?"
  - "사람의 삶을 더 잘 설계하게 도울 수 있는가?"

social_preference:
  preferred: "작지만 진한 신뢰 기반 관계"
  not_ideal: "얕은 네트워킹, 과시형 관계, 의미 없는 반복 노동"
